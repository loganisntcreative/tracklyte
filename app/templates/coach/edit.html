{% extends "base.html" %}
{% block title %}Edit coach profile — TrackLyte{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto">
    <div class="flex items-center justify-between mb-6">
        <h1 class="text-2xl font-semibold">Edit profile</h1>
        <a href="/coach/profile" class="text-sm text-gray-500 hover:text-gray-800">← Back</a>
    </div>

    <form method="POST" action="/coach/profile/edit">
        <div class="bg-white border border-gray-200 rounded-xl p-6 mb-4">
            <h2 class="text-sm font-medium text-gray-500 uppercase tracking-wide mb-4">Basic info</h2>
            <div class="grid grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-sm text-gray-600 mb-1">First name</label>
                    <input type="text" name="first_name" value="{{ coach.first_name }}" required
                        class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400">
                </div>
                <div>
                    <label class="block text-sm text-gray-600 mb-1">Last name</label>
                    <input type="text" name="last_name" value="{{ coach.last_name }}" required
                        class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400">
                </div>
            </div>
            <div class="mb-4">
                <label class="block text-sm text-gray-600 mb-1">School / institution</label>
                <input type="text" name="school" value="{{ coach.school }}" required
                    class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400">
            </div>
            <div class="mb-4">
                <label class="block text-sm text-gray-600 mb-1">Division / level</label>
                <select name="college"
                    class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400">
                    <option value="">Select...</option>
                    {% for division in divisions %}
                        <option value="{{ division }}" {% if division == coach.college %}selected{% endif %}>{{ division }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label class="block text-sm text-gray-600 mb-1">State</label>
                <select name="state" required
                    class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400">
                    {% for state in states %}
                        <option value="{{ state }}" {% if state == coach.state %}selected{% endif %}>{{ state }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="bg-white border border-gray-200 rounded-xl p-6 mb-6">
            <h2 class="text-sm font-medium text-gray-500 uppercase tracking-wide mb-4">Bio</h2>
            <textarea name="bio" rows="4"
                class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400 resize-none">{{ coach.bio or '' }}</textarea>
        </div>

        <button type="submit"
            class="w-full bg-emerald-600 text-white py-3 rounded-lg text-sm font-medium hover:bg-emerald-700">
            Save changes
        </button>
    </form>
</div>
{% endblock %}
