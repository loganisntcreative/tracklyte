{% if chart_data and chart_data != '{}' %}
<div class="mt-6">
    <p class="text-xs font-medium text-gray-400 uppercase tracking-wide mb-4">Progress over time</p>
    <div id="pr-charts"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
const chartData = {{ chart_data | safe }};
const container = document.getElementById('pr-charts');

const colors = [
    '#1D9E75', '#3B82F6', '#8B5CF6', '#F59E0B',
    '#EF4444', '#10B981', '#6366F1', '#F97316'
];

function timeToSeconds(t) {
    t = t.trim();
    if (t.includes(':')) {
        const parts = t.split(':');
        return parseFloat(parts[0]) * 60 + parseFloat(parts[1]);
    }
    const num = parseFloat(t.replace(/[^0-9.]/g, ''));
    return isNaN(num) ? 0 : num;
}

function formatSeconds(s, originalValues) {
    const closest = originalValues.reduce((prev, curr) =>
        Math.abs(timeToSeconds(curr) - s) < Math.abs(timeToSeconds(prev) - s) ? curr : prev
    );
    return closest;
}

let colorIndex = 0;
for (const [event, data] of Object.entries(chartData)) {
    const wrapper = document.createElement('div');
    wrapper.style.cssText = 'margin-bottom: 28px;';

    const label = document.createElement('p');
    label.style.cssText = 'font-size: 12px; color: #6B7280; font-weight: 500; margin-bottom: 8px;';
    label.textContent = event;

    const canvas = document.createElement('canvas');
    canvas.style.cssText = 'max-height: 200px;';

    wrapper.appendChild(label);
    wrapper.appendChild(canvas);
    container.appendChild(wrapper);

    const color = colors[colorIndex % colors.length];
    colorIndex++;

    const numericValues = data.values.map(timeToSeconds);

    new Chart(canvas, {
        type: 'line',
        data: {
            labels: data.labels,
            datasets: [{
                data: numericValues,
                borderColor: color,
                backgroundColor: color + '18',
                borderWidth: 2,
                pointBackgroundColor: color,
                pointRadius: 5,
                pointHoverRadius: 7,
                fill: true,
                tension: 0.3
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { display: false },
                tooltip: {
                    callbacks: {
                        label: ctx => data.values[ctx.dataIndex]
                    }
                }
            },
            scales: {
                x: {
                    grid: { display: false },
                    ticks: { font: { size: 11 }, color: '#9CA3AF' }
                },
                y: {
                    grid: { color: '#F3F4F6' },
                    ticks: {
                        font: { size: 11 },
                        color: '#9CA3AF',
                        callback: val => formatSeconds(val, data.values)
                    }
                }
            }
        }
    });
}
</script>
{% endif %}
