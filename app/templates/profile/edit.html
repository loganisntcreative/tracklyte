{% extends "base.html" %}
{% block title %}Edit profile — TrackLyte{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto">
    <div class="flex items-center justify-between mb-6">
        <h1 class="text-2xl font-semibold">Edit profile</h1>
        <a href="/profile" class="text-sm text-gray-500 hover:text-gray-800">← Back</a>
    </div>

    <form method="POST" action="/profile/edit">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="bg-white border border-gray-200 rounded-xl p-6 mb-4">
            <h2 class="text-sm font-medium text-gray-500 uppercase tracking-wide mb-4">Basic info</h2>
            <div class="grid grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-sm text-gray-600 mb-1">First name</label>
                    <input type="text" name="first_name" value="{{ athlete.first_name }}" required
                        class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400">
                </div>
                <div>
                    <label class="block text-sm text-gray-600 mb-1">Last name</label>
                    <input type="text" name="last_name" value="{{ athlete.last_name }}" required
                        class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400">
                </div>
            </div>
            <div class="mb-4">
                <label class="block text-sm text-gray-600 mb-1">High school name</label>
                <input type="text" name="school" value="{{ athlete.school }}" required
                    class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm text-gray-600 mb-1">Graduation year</label>
                    <select name="grad_year" required
                        class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400">
                        {% for year in grad_years %}
                            <option value="{{ year }}" {% if year == athlete.grad_year %}selected{% endif %}>{{ year }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label class="block text-sm text-gray-600 mb-1">State</label>
                    <select name="state" required
                        class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400">
                        {% for state in states %}
                            <option value="{{ state }}" {% if state == athlete.state %}selected{% endif %}>{{ state }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
        </div>

        <div class="bg-white border border-gray-200 rounded-xl p-6 mb-4">
            <h2 class="text-sm font-medium text-gray-500 uppercase tracking-wide mb-4">Events</h2>
            <div class="flex flex-wrap gap-2">
                {% for event in events %}
                <label class="cursor-pointer">
                    <input type="checkbox" name="events" value="{{ event }}" class="sr-only peer"
                        {% if event in current_events %}checked{% endif %}>
                    <span class="peer-checked:bg-emerald-600 peer-checked:text-white peer-checked:border-emerald-600 border border-gray-200 rounded-full px-3 py-1 text-sm text-gray-600 hover:border-emerald-400 transition-colors">
                        {{ event }}
                    </span>
                </label>
                {% endfor %}
            </div>
        </div>

        <div class="bg-white border border-gray-200 rounded-xl p-6 mb-6">
            <h2 class="text-sm font-medium text-gray-500 uppercase tracking-wide mb-4">Bio</h2>
            <textarea name="bio" rows="4"
                class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400 resize-none">{{ athlete.bio or '' }}</textarea>
        </div>

        <button type="submit"
            class="w-full bg-emerald-600 text-white py-3 rounded-lg text-sm font-medium hover:bg-emerald-700">
            Save changes
        </button>
    </form>
</div>
{% endblock %}
