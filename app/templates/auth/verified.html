<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email verified — TrackLyte</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center px-4">
    <div class="max-w-sm w-full text-center">
        <div class="bg-white border border-gray-200 rounded-2xl p-10 shadow-sm">
            <div class="w-16 h-16 bg-emerald-50 rounded-full flex items-center justify-center mx-auto mb-6">
                <span style="font-size:32px;">✅</span>
            </div>
            <h1 class="text-2xl font-semibold text-gray-900 mb-2">Email verified!</h1>
            <p class="text-gray-500 text-sm mb-8">
                Your TrackLyte account is now active. Open TrackLyte in your browser and sign in to get started.
            </p>
            <a href="https://tracklyte.onrender.com/login"
                style="display:block;background:#1D9E75;color:white;padding:14px 24px;border-radius:10px;text-decoration:none;font-weight:600;font-size:15px;">
                Sign in to TrackLyte
            </a>
            <p class="text-xs text-gray-400 mt-4">
                If the button doesn't work, copy this link into your browser:<br>
                <span style="color:#1D9E75;">tracklyte.onrender.com/login</span>
            </p>
        </div>
    </div>
</body>
</html>
