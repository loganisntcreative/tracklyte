{% extends "base.html" %}
{% block title %}Create account — TrackLyte{% endblock %}

{% block content %}
<div class="max-w-sm mx-auto mt-6">
    <div class="text-center mb-8">
        <h1 class="text-2xl font-semibold text-gray-900">Create your account</h1>
        <p class="text-sm text-gray-500 mt-2">Join TrackLyte for free</p>
    </div>
    <div class="bg-white border border-gray-200 rounded-xl p-8">
        <form method="POST" action="/register">
            <div class="mb-5">
                <label class="block text-sm text-gray-600 mb-2">I am a...</label>
                <div class="flex gap-3">
                    <label class="flex-1 border border-gray-200 rounded-lg px-3 py-2.5 text-sm text-center cursor-pointer has-[:checked]:border-brand-400 has-[:checked]:bg-brand-50 has-[:checked]:text-brand-600 transition-colors font-medium">
                        <input type="radio" name="role" value="athlete" class="sr-only" required> Athlete
                    </label>
                    <label class="flex-1 border border-gray-200 rounded-lg px-3 py-2.5 text-sm text-center cursor-pointer has-[:checked]:border-brand-400 has-[:checked]:bg-brand-50 has-[:checked]:text-brand-600 transition-colors font-medium">
                        <input type="radio" name="role" value="coach" class="sr-only"> Coach
                    </label>
                </div>
            </div>
            <div class="mb-4">
                <label class="block text-sm text-gray-600 mb-1.5">Email</label>
                <input type="email" name="email" required autofocus
                    class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand-400">
            </div>
            <div class="mb-4">
                <label class="block text-sm text-gray-600 mb-1.5">Password <span class="text-gray-400">(min. 8 chars)</span></label>
                <input type="password" name="password" required minlength="8"
                    class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand-400">
            </div>
            <div class="mb-6">
                <label class="block text-sm text-gray-600 mb-1.5">Confirm password</label>
                <input type="password" name="confirm_password" required
                    class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand-400">
            </div>
            <button type="submit"
                class="w-full bg-brand-400 text-white py-2.5 rounded-lg text-sm font-medium hover:bg-brand-600 transition-colors">
                Create account
            </button>
        </form>
        <p class="text-center text-sm text-gray-500 mt-5">
            Already have one? <a href="/login" class="text-brand-400 hover:text-brand-600 font-medium">Sign in</a>
        </p>
    </div>
</div>
{% endblock %}
