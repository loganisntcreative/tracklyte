{% extends "base.html" %}
{% block title %}Sign in — TrackLyte{% endblock %}

{% block content %}
<div class="max-w-sm mx-auto mt-6">
    <div class="text-center mb-8">
        <h1 class="text-2xl font-semibold text-gray-900">Welcome back</h1>
        <p class="text-sm text-gray-500 mt-2">Sign in to your TrackLyte account</p>
    </div>
    <div class="bg-white border border-gray-200 rounded-xl p-8">
        <form method="POST" action="/login">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-4">
                <label class="block text-sm text-gray-600 mb-1.5">Email</label>
                <input type="email" name="email" required autofocus
                    class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand-400">
            </div>
            <div class="mb-6">
                <label class="block text-sm text-gray-600 mb-1.5">Password</label>
                <input type="password" name="password" required
                    class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand-400">
            </div>
            <button type="submit"
                class="w-full bg-brand-400 text-white py-2.5 rounded-lg text-sm font-medium hover:bg-brand-600 transition-colors">
                Sign in
            </button>
        </form>
        <p class="text-center text-sm text-gray-500 mt-5">
            No account? <a href="/register" class="text-brand-400 hover:text-brand-600 font-medium">Get started</a>
        </p>
    </div>
</div>
{% endblock %}
